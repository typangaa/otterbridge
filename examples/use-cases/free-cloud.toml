# weir use-case: Free cloud — zero cost, multiple cloud providers
#
# All backends use free tiers:
#   - OpenRouter free models (auto-rotated by openrouter/free)
#   - Google Gemini free tier (1,000 req/day on AI Studio key)
#
# Prerequisites:
#   hermes installed and configured with OpenRouter key
#   gemini CLI installed: npm install -g @google/gemini-cli && gemini auth login
#
# No paid API usage. Mix model families for diversity.

# ── Resilience ────────────────────────────────────────────────────────────────
# Global resilience policy applied to every backend call. All fields are
# optional; the values below are the defaults. Per-backend overrides may set
# retry_attempts, failure_threshold, recovery_secs and rate_limit_rps.
#
# Rate limiting is fail-fast: an empty bucket returns a `rate limited` error
# immediately — it is not retried and does not trip the circuit breaker.
# Free-tier cloud backends have daily quotas — a low rate_limit_rps helps
# spread requests and avoid bursts that exhaust the quota.

[resilience]
retry_attempts    = 3       # total attempts (first try + retries) on transient failures
base_delay_ms     = 100     # base backoff before first retry
max_delay_ms      = 5000    # cap on backoff delay
failure_threshold = 5       # consecutive failures before the circuit opens
recovery_secs     = 30      # seconds the circuit stays open before probing
rate_limit_rps    = 100.0   # sustained requests/sec per backend; 0 disables the limiter

# ── Backends ──────────────────────────────────────────────────────────────────

# OpenRouter — auto-pick any free model
[[backend]]
name          = "or-free"
type          = "stdio-cli"
command       = "hermes"
args          = ["-z", "{prompt}", "--provider", "openrouter", "-m", "{model}"]
default_model = "openrouter/free"
timeout_secs  = 120

# OpenRouter — Meta Llama 3.3 70B (free, strong general reasoning)
[[backend]]
name          = "or-llama"
type          = "stdio-cli"
command       = "hermes"
args          = ["-z", "{prompt}", "--provider", "openrouter", "-m", "{model}"]
default_model = "meta-llama/llama-3.3-70b-instruct:free"
timeout_secs  = 120

# OpenRouter — Qwen3 Coder (free, strong for code)
[[backend]]
name          = "or-qwen-coder"
type          = "stdio-cli"
command       = "hermes"
args          = ["-z", "{prompt}", "--provider", "openrouter", "-m", "{model}"]
default_model = "qwen/qwen3-coder:free"
timeout_secs  = 120

# Google Gemini Flash (free tier, 1000 req/day, fast)
[[backend]]
name         = "gemini-flash"
type         = "stdio-cli"
command      = "gemini"
args         = ["--model", "gemini-2.5-flash", "-p", "{prompt}"]
timeout_secs = 60

# Google Gemini Pro (free tier, 1000 req/day, quality)
[[backend]]
name         = "gemini-pro"
type         = "stdio-cli"
command      = "gemini"
args         = ["-p", "{prompt}"]
timeout_secs = 120
rate_limit_rps = 2.0  # throttle quota-limited cloud

# ── Workflows ─────────────────────────────────────────────────────────────────

# Fan-out: three free models from different families in parallel
[[workflow]]
name        = "free-review"
pattern     = "fan-out"
backends    = ["or-llama", "or-qwen-coder", "gemini-flash"]
aggregation = "all"

# Pipeline: OpenRouter free drafts, Gemini Pro polishes
[[workflow]]
name    = "draft-then-polish"
pattern = "pipeline"

[[workflow.steps]]
backend = "or-llama"
role    = "drafter"

[[workflow.steps]]
backend         = "gemini-pro"
role            = "polisher"
prompt_template = "Refine and improve this draft:\n\n{{step.output}}"

# Fusion: OpenRouter + Qwen panel → Gemini Pro judges + synthesizes
[[workflow]]
name        = "deep-review"
pattern     = "fusion"
backends    = ["or-llama", "or-qwen-coder"]
judge       = "gemini-pro"
synthesizer = "gemini-pro"

# Eval-loop: free model generates, Gemini Pro evaluates
[[workflow]]
name           = "quality-loop"
pattern        = "eval-loop"
generator      = "or-free"
evaluator      = "gemini-pro"
max_iterations = 3
