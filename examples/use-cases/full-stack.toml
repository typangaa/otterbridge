# weir use-case: Full-stack hybrid — local + free cloud + paid cloud
#
# Best-of-all-worlds: local models for privacy/bulk, free cloud for breadth,
# paid cloud for final quality. Workflows route intelligently by cost/quality.
#
# Prerequisites:
#   hermes installed + OpenRouter key configured
#   claude CLI: npm install -g @anthropic-ai/claude-code && claude login
#   gemini CLI: npm install -g @google/gemini-cli && gemini auth login
#   ollama pull llama3.2 && ollama serve

[server]
name      = "weir"
transport = "stdio"

# ── Resilience ────────────────────────────────────────────────────────────────
# Global resilience policy applied to every backend call. All fields are
# optional; the values below are the defaults. Per-backend overrides may set
# retry_attempts, failure_threshold, recovery_secs and rate_limit_rps.
#
# Rate limiting is fail-fast: an empty bucket returns a `rate limited` error
# immediately — it is not retried and does not trip the circuit breaker.
# Local backends rarely need throttling (rate_limit_rps = 0); quota-limited
# paid/cloud backends benefit from a low rate_limit_rps such as 2.0.

[resilience]
retry_attempts    = 3       # total attempts (first try + retries) on transient failures
base_delay_ms     = 100     # base backoff before first retry
max_delay_ms      = 5000    # cap on backoff delay
failure_threshold = 5       # consecutive failures before the circuit opens
recovery_secs     = 30      # seconds the circuit stays open before probing
rate_limit_rps    = 100.0   # sustained requests/sec per backend; 0 disables the limiter

# ── Backends ──────────────────────────────────────────────────────────────────

# Local — fast, private, free (Ollama)
[[backend]]
name     = "local"
type     = "openai-compat"
base_url = "http://localhost:11434"
model    = "llama3.2"
rate_limit_rps = 0  # local — no throttle

# Free cloud — OpenRouter auto-picks any free model
[[backend]]
name          = "free-cloud"
type          = "stdio-cli"
command       = "hermes"
args          = ["-z", "{prompt}", "--provider", "openrouter", "-m", "{model}"]
default_model = "openrouter/free"
timeout_secs  = 120

# Free cloud — Gemini Flash (Google free tier, 1000 req/day)
[[backend]]
name         = "gemini-flash"
type         = "stdio-cli"
command      = "gemini"
args         = ["--model", "gemini-2.5-flash", "-p", "{prompt}"]
timeout_secs = 60

# Paid cloud — Claude Code (high-quality reasoning, synthesis, judging)
[[backend]]
name         = "claude-code"
type         = "stdio-cli"
command      = "claude"
args         = ["--print", "-p", "{prompt}"]
timeout_secs = 120
rate_limit_rps = 2.0  # throttle quota-limited cloud

# Paid cloud — Gemini Pro (quality, 1000 free req/day)
[[backend]]
name         = "gemini-pro"
type         = "stdio-cli"
command      = "gemini"
args         = ["-p", "{prompt}"]
timeout_secs = 120

# ── Workflows ─────────────────────────────────────────────────────────────────

# Fan-out: local + free cloud + Gemini Flash — diverse, mostly free
[[workflow]]
name        = "broad-review"
pattern     = "fan-out"
backends    = ["local", "free-cloud", "gemini-flash"]
aggregation = "all"

# Fan-out: all backends including paid — maximum diversity
[[workflow]]
name        = "full-review"
pattern     = "fan-out"
backends    = ["local", "free-cloud", "gemini-flash", "claude-code", "gemini-pro"]
aggregation = "all"

# Pipeline: local drafts fast and free, Claude polishes with quality
[[workflow]]
name    = "draft-then-polish"
pattern = "pipeline"

[[workflow.steps]]
backend = "local"
role    = "drafter"

[[workflow.steps]]
backend         = "claude-code"
role            = "polisher"
prompt_template = "Refine and improve this draft:\n\n{input}"

# Fusion: free panel (local + free cloud) → Claude judges + synthesizes
# Paid cost: 1× Claude call (judge/synth). Panel is free.
[[workflow]]
name        = "deep-review"
pattern     = "fusion"
backends    = ["local", "free-cloud", "gemini-flash"]
judge       = "claude-code"
synthesizer = "claude-code"

# Eval-loop: local generates (free), Claude evaluates (paid, high bar)
[[workflow]]
name           = "quality-loop"
pattern        = "eval-loop"
generator      = "local"
evaluator      = "claude-code"
max_iterations = 3
