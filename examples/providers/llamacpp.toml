# weir example: Local models via llama.cpp server
#
# Prerequisites:
#   git clone https://github.com/ggml-org/llama.cpp && cd llama.cpp
#   cmake -B build && cmake --build build --config Release -j$(nproc)
#   # Download GGUF model, then start the server:
#   ./build/bin/llama-server -m model.gguf --port 8080 -c 8192
#
# No API key required — fully local, zero cost, fully private.
# llama.cpp exposes an OpenAI-compatible API at http://localhost:8080.
# Run multiple instances on different ports to serve multiple models in parallel.

[server]
name      = "weir"
transport = "stdio"

# ── Resilience ────────────────────────────────────────────────────────────────
# Global resilience policy applied to every backend call. All fields are
# optional; the values below are the defaults. Per-backend overrides may set
# retry_attempts, failure_threshold, recovery_secs and rate_limit_rps.
#
# Rate limiting is fail-fast: an empty bucket returns a `rate limited` error
# immediately — it is not retried and does not trip the circuit breaker.
# Local backends rarely need throttling — set rate_limit_rps = 0 to disable it.

[resilience]
retry_attempts    = 3       # total attempts (first try + retries) on transient failures
base_delay_ms     = 100     # base backoff before first retry
max_delay_ms      = 5000    # cap on backoff delay
failure_threshold = 5       # consecutive failures before the circuit opens
recovery_secs     = 30      # seconds the circuit stays open before probing
rate_limit_rps    = 100.0   # sustained requests/sec per backend; 0 disables the limiter

# ── Backends ──────────────────────────────────────────────────────────────────

# Primary instance (port 8080) — general-purpose model
[[backend]]
name     = "llama-primary"
type     = "openai-compat"
base_url = "http://localhost:8080"
model    = "local"
rate_limit_rps = 0  # local — no throttle

# Secondary instance (port 8081) — second model or same model, second GPU
[[backend]]
name     = "llama-secondary"
type     = "openai-compat"
base_url = "http://localhost:8081"
model    = "local"

# Tertiary instance (port 8082) — optional third model
[[backend]]
name     = "llama-tertiary"
type     = "openai-compat"
base_url = "http://localhost:8082"
model    = "local"

# ── Workflows ─────────────────────────────────────────────────────────────────

# Fan-out: two instances in parallel (different models or same for consistency check)
[[workflow]]
name        = "dual-local"
pattern     = "fan-out"
backends    = ["llama-primary", "llama-secondary"]
aggregation = "all"

# Pipeline: secondary drafts, primary polishes
[[workflow]]
name    = "draft-then-polish"
pattern = "pipeline"

[[workflow.steps]]
backend = "llama-secondary"
role    = "drafter"

[[workflow.steps]]
backend         = "llama-primary"
role            = "polisher"
prompt_template = "Refine and improve this draft:\n\n{input}"

# Fusion: two instances as panel → third instance judges + synthesizes
[[workflow]]
name        = "deep-review"
pattern     = "fusion"
backends    = ["llama-primary", "llama-secondary"]
judge       = "llama-tertiary"
synthesizer = "llama-tertiary"

# Eval-loop: secondary generates, primary evaluates
[[workflow]]
name           = "quality-loop"
pattern        = "eval-loop"
generator      = "llama-secondary"
evaluator      = "llama-primary"
max_iterations = 3
