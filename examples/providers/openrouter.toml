# weir example: OpenRouter via hermes CLI
#
# Prerequisites:
#   hermes installed and configured with OpenRouter API key
#   (hermes stores the key internally — no API key in this file)
#
# openrouter/free auto-picks any currently available free model.
# Pass --model at call time to pin a specific model:
#   weir chat hermes-or-llama "prompt"
#   weir chat hermes-or-gemma "prompt"
#   weir --json chat hermes-or-free --model "qwen/qwen3-coder:free" "prompt"
#
# Free models (as of 2026-06):
#   openrouter/free                          — auto-pick
#   google/gemma-4-27b-it:free
#   meta-llama/llama-3.3-70b-instruct:free
#   nvidia/nemotron-3-ultra-550b-a55b:free
#   qwen/qwen3-coder:free
#   openai/gpt-oss-120b:free

# ── Resilience ────────────────────────────────────────────────────────────────
# Global resilience policy applied to every backend call. All fields are
# optional; the values below are the defaults. Per-backend overrides may set
# retry_attempts, failure_threshold, recovery_secs and rate_limit_rps.
#
# Rate limiting is fail-fast: an empty bucket returns a `rate limited` error
# immediately — it is not retried and does not trip the circuit breaker.

[resilience]
retry_attempts    = 3       # total attempts (first try + retries) on transient failures
base_delay_ms     = 100     # base backoff before first retry
max_delay_ms      = 5000    # cap on backoff delay
failure_threshold = 5       # consecutive failures before the circuit opens
recovery_secs     = 30      # seconds the circuit stays open before probing
rate_limit_rps    = 100.0   # sustained requests/sec per backend; 0 disables the limiter

# ── Backends ──────────────────────────────────────────────────────────────────

# Auto free — OpenRouter picks any available free model
[[backend]]
name          = "hermes-or-free"
type          = "stdio-cli"
command       = "hermes"
args          = ["-z", "{prompt}", "--provider", "openrouter", "-m", "{model}"]
default_model = "openrouter/free"
timeout_secs  = 120
rate_limit_rps = 2.0  # throttle quota-limited cloud

# Pinned: Meta Llama 3.3 70B (free)
[[backend]]
name          = "hermes-or-llama"
type          = "stdio-cli"
command       = "hermes"
args          = ["-z", "{prompt}", "--provider", "openrouter", "-m", "{model}"]
default_model = "meta-llama/llama-3.3-70b-instruct:free"
timeout_secs  = 120

# Pinned: Google Gemma 4 27B (free)
[[backend]]
name          = "hermes-or-gemma"
type          = "stdio-cli"
command       = "hermes"
args          = ["-z", "{prompt}", "--provider", "openrouter", "-m", "{model}"]
default_model = "google/gemma-4-27b-it:free"
timeout_secs  = 120

# Paid example: DeepSeek R2 (high-quality reasoning, low cost)
[[backend]]
name          = "hermes-or-deepseek"
type          = "stdio-cli"
command       = "hermes"
args          = ["-z", "{prompt}", "--provider", "openrouter", "-m", "{model}"]
default_model = "deepseek/deepseek-r2"
timeout_secs  = 180

# ── Workflows ─────────────────────────────────────────────────────────────────

# Fan-out: three free models in parallel — maximum free diversity
[[workflow]]
name        = "free-review"
pattern     = "fan-out"
backends    = ["hermes-or-free", "hermes-or-llama", "hermes-or-gemma"]
aggregation = "all"

# Pipeline: free model drafts, DeepSeek polishes
[[workflow]]
name    = "draft-then-polish"
pattern = "pipeline"

[[workflow.steps]]
backend = "hermes-or-llama"
role    = "drafter"

[[workflow.steps]]
backend         = "hermes-or-deepseek"
role            = "polisher"
prompt_template = "Refine and improve this draft:\n\n{{step.output}}"

# Fusion: free model panel → DeepSeek judges + synthesizes
[[workflow]]
name        = "deep-review"
pattern     = "fusion"
backends    = ["hermes-or-llama", "hermes-or-gemma"]
judge       = "hermes-or-deepseek"
synthesizer = "hermes-or-deepseek"

# Eval-loop: free model generates, DeepSeek evaluates
[[workflow]]
name           = "quality-loop"
pattern        = "eval-loop"
generator      = "hermes-or-free"
evaluator      = "hermes-or-deepseek"
max_iterations = 3
