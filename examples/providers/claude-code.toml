# weir example: Anthropic via Claude Code CLI
#
# Prerequisites:
#   npm install -g @anthropic-ai/claude-code
#   claude login
#
# Claude Code manages its own authentication — no API key in this file.
# Two backends: default Sonnet (quality) and Haiku (fast/cheap).

# ── Resilience ────────────────────────────────────────────────────────────────
# Global resilience policy applied to every backend call. All fields are
# optional; the values below are the defaults. Per-backend overrides may set
# retry_attempts, failure_threshold, recovery_secs and rate_limit_rps.
#
# Rate limiting is fail-fast: an empty bucket returns a `rate limited` error
# immediately — it is not retried and does not trip the circuit breaker.

[resilience]
retry_attempts    = 3       # total attempts (first try + retries) on transient failures
base_delay_ms     = 100     # base backoff before first retry
max_delay_ms      = 5000    # cap on backoff delay
failure_threshold = 5       # consecutive failures before the circuit opens
recovery_secs     = 30      # seconds the circuit stays open before probing
rate_limit_rps    = 100.0   # sustained requests/sec per backend; 0 disables the limiter

# ── Backends ──────────────────────────────────────────────────────────────────

# Claude Code — default model (Sonnet, balanced)
[[backend]]
name         = "claude-code"
type         = "stdio-cli"
command      = "claude"
args         = ["--print", "-p", "{prompt}"]
timeout_secs = 120
rate_limit_rps = 2.0  # throttle quota-limited cloud

# Claude Code — fast variant (Haiku, cheaper)
[[backend]]
name         = "claude-code-haiku"
type         = "stdio-cli"
command      = "claude"
args         = ["--print", "--model", "claude-haiku-4-5", "-p", "{prompt}"]
timeout_secs = 60

# ── Workflows ─────────────────────────────────────────────────────────────────

# Fan-out: Sonnet + Haiku in parallel — different model sizes, different perspectives
[[workflow]]
name        = "dual-claude"
pattern     = "fan-out"
backends    = ["claude-code", "claude-code-haiku"]
aggregation = "all"

# Pipeline: Haiku drafts fast, Sonnet polishes
[[workflow]]
name    = "draft-then-polish"
pattern = "pipeline"

[[workflow.steps]]
backend = "claude-code-haiku"
role    = "drafter"

[[workflow.steps]]
backend         = "claude-code"
role            = "polisher"
prompt_template = "Refine and improve this draft:\n\n{{step.output}}"

# Fusion: Haiku panel (two independent passes) → Sonnet judges + synthesizes
[[workflow]]
name        = "deep-review"
pattern     = "fusion"
backends    = ["claude-code-haiku", "claude-code-haiku"]
judge       = "claude-code"
synthesizer = "claude-code"

# Eval-loop: Haiku generates, Sonnet evaluates quality — iterate up to 3×
[[workflow]]
name           = "quality-loop"
pattern        = "eval-loop"
generator      = "claude-code-haiku"
evaluator      = "claude-code"
max_iterations = 3
