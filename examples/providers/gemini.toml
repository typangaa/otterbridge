# weir example: Google Gemini via Gemini CLI
#
# Prerequisites:
#   npm install -g @google/gemini-cli
#   gemini auth login        (or set GEMINI_API_KEY)
#
# Free tier: 1,000 requests/day on Google AI Studio key.
# Gemini CLI manages its own authentication — no API key in this file.
# Two backends: Pro (quality) and Flash (fast/cheap).

# ── Resilience ────────────────────────────────────────────────────────────────
# Global resilience policy applied to every backend call. All fields are
# optional; the values below are the defaults. Per-backend overrides may set
# retry_attempts, failure_threshold, recovery_secs and rate_limit_rps.
#
# Rate limiting is fail-fast: an empty bucket returns a `rate limited` error
# immediately — it is not retried and does not trip the circuit breaker.

[resilience]
retry_attempts    = 3       # total attempts (first try + retries) on transient failures
base_delay_ms     = 100     # base backoff before first retry
max_delay_ms      = 5000    # cap on backoff delay
failure_threshold = 5       # consecutive failures before the circuit opens
recovery_secs     = 30      # seconds the circuit stays open before probing
rate_limit_rps    = 100.0   # sustained requests/sec per backend; 0 disables the limiter

# ── Backends ──────────────────────────────────────────────────────────────────

# Gemini 2.5 Pro — high-quality reasoning
[[backend]]
name         = "gemini-pro"
type         = "stdio-cli"
command      = "gemini"
args         = ["-p", "{prompt}"]
timeout_secs = 120
rate_limit_rps = 2.0  # throttle quota-limited cloud

# Gemini 2.5 Flash — fast, cheap, still strong
[[backend]]
name         = "gemini-flash"
type         = "stdio-cli"
command      = "gemini"
args         = ["--model", "gemini-2.5-flash", "-p", "{prompt}"]
timeout_secs = 60

# ── Workflows ─────────────────────────────────────────────────────────────────

# Fan-out: Pro + Flash in parallel
[[workflow]]
name        = "dual-gemini"
pattern     = "fan-out"
backends    = ["gemini-pro", "gemini-flash"]
aggregation = "all"

# Pipeline: Flash drafts, Pro polishes
[[workflow]]
name    = "draft-then-polish"
pattern = "pipeline"

[[workflow.steps]]
backend = "gemini-flash"
role    = "drafter"

[[workflow.steps]]
backend         = "gemini-pro"
role            = "polisher"
prompt_template = "Refine and improve this draft:\n\n{{step.output}}"

# Fusion: Flash panel → Pro judges + synthesizes
[[workflow]]
name        = "deep-review"
pattern     = "fusion"
backends    = ["gemini-flash", "gemini-flash"]
judge       = "gemini-pro"
synthesizer = "gemini-pro"

# Eval-loop: Flash generates, Pro evaluates — iterate up to 3×
[[workflow]]
name           = "quality-loop"
pattern        = "eval-loop"
generator      = "gemini-flash"
evaluator      = "gemini-pro"
max_iterations = 3
