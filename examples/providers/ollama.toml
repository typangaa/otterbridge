# weir example: Local models via Ollama
#
# Prerequisites:
#   curl -fsSL https://ollama.com/install.sh | sh
#   ollama pull llama3.2          # fast, general purpose
#   ollama pull qwen2.5-coder     # coding tasks
#   ollama serve                  # starts on http://localhost:11434
#
# No API key required — fully local, zero cost, fully private.
# Adjust model names to match what you have pulled locally (ollama list).

[server]
name      = "weir"
transport = "stdio"

# ── Resilience ────────────────────────────────────────────────────────────────
# Global resilience policy applied to every backend call. All fields are
# optional; the values below are the defaults. Per-backend overrides may set
# retry_attempts, failure_threshold, recovery_secs and rate_limit_rps.
#
# Rate limiting is fail-fast: an empty bucket returns a `rate limited` error
# immediately — it is not retried and does not trip the circuit breaker.
# Local backends rarely need throttling — set rate_limit_rps = 0 to disable it.

[resilience]
retry_attempts    = 3       # total attempts (first try + retries) on transient failures
base_delay_ms     = 100     # base backoff before first retry
max_delay_ms      = 5000    # cap on backoff delay
failure_threshold = 5       # consecutive failures before the circuit opens
recovery_secs     = 30      # seconds the circuit stays open before probing
rate_limit_rps    = 100.0   # sustained requests/sec per backend; 0 disables the limiter

# ── Backends ──────────────────────────────────────────────────────────────────

# General-purpose model (e.g. llama3.2, mistral, gemma3)
[[backend]]
name     = "ollama"
type     = "openai-compat"
base_url = "http://localhost:11434"
model    = "llama3.2"
rate_limit_rps = 0  # local — no throttle

# Coding-focused model
[[backend]]
name     = "ollama-coder"
type     = "openai-compat"
base_url = "http://localhost:11434"
model    = "qwen2.5-coder"

# Large model for quality reasoning (requires more VRAM)
[[backend]]
name     = "ollama-large"
type     = "openai-compat"
base_url = "http://localhost:11434"
model    = "llama3.3:70b"

# ── Workflows ─────────────────────────────────────────────────────────────────

# Fan-out: general + coder in parallel
[[workflow]]
name        = "dual-local"
pattern     = "fan-out"
backends    = ["ollama", "ollama-coder"]
aggregation = "all"

# Pipeline: coder drafts, large model polishes
[[workflow]]
name    = "draft-then-polish"
pattern = "pipeline"

[[workflow.steps]]
backend = "ollama-coder"
role    = "drafter"

[[workflow.steps]]
backend         = "ollama-large"
role            = "polisher"
prompt_template = "Refine and improve this draft:\n\n{input}"

# Fusion: general + coder panel → large model judges + synthesizes
[[workflow]]
name        = "deep-review"
pattern     = "fusion"
backends    = ["ollama", "ollama-coder"]
judge       = "ollama-large"
synthesizer = "ollama-large"

# Eval-loop: coder generates, large model evaluates
[[workflow]]
name           = "quality-loop"
pattern        = "eval-loop"
generator      = "ollama-coder"
evaluator      = "ollama-large"
max_iterations = 3
