# weir.example.toml — annotated example configuration for the weir CLI agent orchestrator.
#
# Copy this file to weir.toml and edit to suit your setup.
# Run `weir validate` to check for errors.
# Run `weir schema` to see the full JSON Schema for this file.
#
# Sections:
#   [[backend]]   — one entry per local CLI agent
#   [[workflow]]  — one entry per named orchestration workflow

# ── resilience ────────────────────────────────────────────────────────────────
# Global resilience policy applied to every backend call. All fields are
# optional; the values below are the defaults. Individual [[backend]] entries
# may override retry_attempts, failure_threshold, recovery_secs and
# rate_limit_rps to tune behaviour per endpoint.
#
# Note: rate limiting is fail-fast — when a backend's bucket is empty the
# request returns a `rate limited` error immediately. It is NOT retried and
# does NOT count toward the circuit breaker's failure threshold.

[resilience]
retry_attempts    = 3       # total attempts (first try + retries) on transient failures
base_delay_ms     = 100     # base backoff before first retry
max_delay_ms      = 5000    # cap on backoff delay
failure_threshold = 5       # consecutive failures before the circuit opens
recovery_secs     = 30      # seconds the circuit stays open before probing
rate_limit_rps    = 100.0   # sustained requests/sec per backend; 0 disables the limiter

# ── backends ──────────────────────────────────────────────────────────────────
# Each [[backend]] entry declares one local CLI agent. There is exactly one
# driver type:
#
#   type = "stdio-cli"
#     A local command invoked once per request in oneshot (non-interactive) mode.
#     The literal token {prompt} in `args` is replaced with the user message.
#
# weir is a CLI orchestrator — it does NOT call HTTP endpoints and does NOT run
# an HTTP server. It never handles API keys: each agent CLI (hermes, claude,
# agy, gemini, ollama, …) you have installed and logged in yourself owns its own
# credentials and network access. There is no api_key field of any kind here.

# ── backend: ollama (local, via the `ollama run` CLI) ─────────────────────────
# `ollama run MODEL "prompt"` prints one response and exits — no `ollama serve`
# or HTTP needed.
[[backend]]
name    = "ollama"
type    = "stdio-cli"
command = "ollama"
args    = ["run", "llama3.2", "{prompt}"]
rate_limit_rps = 0  # local — no throttle

# Optional: override the per-request timeout (default: 60 s).
# timeout_secs = 120

# ── backend: hermes (local stdio CLI agent) ───────────────────────────────────
[[backend]]
name    = "hermes"
type    = "stdio-cli"
command = "hermes"
# {prompt} is replaced with the full user message at call time.
# The -z flag puts hermes in "oneshot / zero-shot" mode so it exits after
# generating one response — required for stdio-cli backends.
args    = ["-z", "{prompt}"]

# ── backend: openrouter (cloud, via the hermes CLI) ───────────────────────────
# Authenticated remote APIs go through a stdio-cli agent, NOT openai-compat —
# weir handles no keys. hermes stores the OpenRouter key in its own config; you
# set that up once with hermes itself, independent of weir.
[[backend]]
name    = "openrouter"
type    = "stdio-cli"
command = "hermes"
args    = ["-z", "{prompt}", "--provider", "openrouter"]
rate_limit_rps = 2.0  # throttle quota-limited cloud

# ── workflows ─────────────────────────────────────────────────────────────────
# Each [[workflow]] entry wires backends together using an orchestration pattern.
#
# Patterns:
#   pipeline   — pass output of step N as input to step N+1 (serial chain).
#   fan-out    — dispatch the same prompt to all backends in parallel; collect
#                all responses (aggregation = "all") or return the first
#                (aggregation = "first").
#   router     — route the request to one backend chosen at runtime.
#   eval-loop  — generator produces a draft; evaluator critiques it; repeat
#                until the evaluator approves or max_iterations is reached.

# ── workflow: draft-then-polish (pipeline) ────────────────────────────────────
# Step 1: ollama drafts an initial response.
# Step 2: hermes polishes / refines the draft.
#
# The pipeline engine injects the previous step's output as the user message
# for the next step. Use prompt_template with {{step.output}} to customise the handoff.

[[workflow]]
name    = "draft-then-polish"
pattern = "pipeline"

  [[workflow.steps]]
  backend = "ollama"
  # role is an optional semantic label — not used by the engine, but useful
  # for logging and for prompt templates in downstream steps.
  role    = "drafter"

  [[workflow.steps]]
  backend         = "hermes"
  role            = "polisher"
  # {{step.output}} is replaced with the output of the previous step.
  prompt_template = "Please refine and polish the following draft:\n\n{{step.output}}"

# ── workflow: multi-review (fan-out) ─────────────────────────────────────────
# Send the same prompt to both ollama and hermes simultaneously.
# With aggregation = "all", both responses are returned to the caller
# so you can compare or merge them.

[[workflow]]
name        = "multi-review"
pattern     = "fan-out"
backends    = ["ollama", "hermes"]
# "all"   — return every response (default for fan-out).
# "first" — return only the fastest response.
aggregation = "all"
